# data/maps/map_01.yaml
#
# Map 01 — Symmetrical arena with two mid-lane walls and four corner blocks.
#
# Arena: 1600 x 1200 px
# Player spawns at (800, 600)  — arena center
# AI spawns at    (1280, 240)  — top-right quadrant
#
# Layout intent:
#   Two tall vertical stone walls (left/right of center) split the arena into
#   three lanes.  Four shorter blocks of varying material sit at upper and
#   lower mid-field to create flanking opportunities and destructible cover.
#
# Fields:
#   x, y            — top-left corner of the obstacle in world space
#   width, height
#   material_type   — key into data/configs/materials.yaml
#   reflective      — reserved for future non-reflective surface variant

name: "Headquarters"
theme: "default"

obstacles:
  # Left mid-lane wall — indestructible stone; permanent lane divider
  - x: 350
    y: 430
    width: 90
    height: 240
    material_type: stone
    reflective: false

  # Right mid-lane wall — mirror of left; stone
  - x: 1160
    y: 430
    width: 90
    height: 240
    material_type: stone
    reflective: false

  # Upper-left block — brick; takes several shots to destroy
  - x: 430
    y: 180
    width: 160
    height: 80
    material_type: brick
    reflective: false

  # Upper-right block — brick; mirror of upper-left
  - x: 1010
    y: 180
    width: 160
    height: 80
    material_type: brick
    reflective: false

  # Center corridor barrier — reinforced steel; explosive damage only (v0.21)
  # Blocks the direct crossing between the two stone lane dividers.
  # Homing missiles (5 hits) or flank via outer lanes.
  - x: 720
    y: 570
    width: 160
    height: 50
    material_type: reinforced_steel
    reflective: false

  # Upper-right chokepoint — reinforced steel; guards path to AI spawn
  # Sits between upper-right brick and right stone wall.
  - x: 1100
    y: 310
    width: 100
    height: 70
    material_type: reinforced_steel
    reflective: false

  # Lower-left block — wood; fragile, goes down in a few hits
  - x: 430
    y: 940
    width: 160
    height: 80
    material_type: wood
    reflective: false

  # Lower-right block — crate; very fragile, dies in ~1-2 shots
  - x: 1010
    y: 940
    width: 160
    height: 80
    material_type: crate
    reflective: false

pickup_spawns:
  - {x: 400,  y: 300}
  - {x: 1200, y: 300}
  - {x: 400,  y: 900}
  - {x: 1200, y: 900}
  - {x: 800,  y: 600}
