# data/maps/map_03.yaml
#
# Map 03 — Tundra: symmetric maze-like snow arena.
#
# Arena: 1600 x 1200 px
# Player spawns at (800, 600)  — arena center
# AI spawns at    (1280, 240)  — top-right quadrant
#
# Layout intent:
#   Many small obstacles create a dense maze feel.  Tight corridors reward
#   bouncing_round and careful positioning.  Full left-right symmetry means
#   neither player has a positional advantage at spawn.

name: "Tundra"
theme: "snow"

obstacles:
  # Top-left corner block — stone
  - x: 150
    y: 200
    width: 100
    height: 100
    material_type: stone
    reflective: false

  # Top-right corner block — stone (mirror)
  - x: 1350
    y: 200
    width: 100
    height: 100
    material_type: stone
    reflective: false

  # Upper-left tall wall — brick
  - x: 400
    y: 200
    width: 80
    height: 200
    material_type: brick
    reflective: false

  # Upper-right tall wall — brick (mirror)
  - x: 1120
    y: 200
    width: 80
    height: 200
    material_type: brick
    reflective: false

  # Top-centre — wide wood block
