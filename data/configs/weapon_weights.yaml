# data/configs/weapon_weights.yaml
#
# Probability weights for random weapon assignment within each category pool.
# Higher weight = more likely to be drawn from that category.
#
# Design principle: utility/fun weapons are common,
# powerful/specialized weapons are rare.

# Basic
standard_shell:    30
spread_shot:       28
bouncing_round:    25

# Elemental
cryo_round:        25
poison_shell:      25
flamethrower:      22
lava_gun:          18

# Heavy
homing_missile:    20
grenade_launcher:  18
railgun:           12
laser_beam:        8

# Tactical
emp_blast:         25
glue_gun:          25
concussion_blast:  22
