# data/configs/weapons.yaml
#
# Weapon definitions. Adding a new weapon requires ONLY adding an entry here.
#
# Fields:
#   damage       - HP removed per hit
#   speed        - bullet travel speed in pixels/second
#   fire_rate    - shots per second (overrides tank fire_rate if set)
#   max_bounces  - number of wall bounces before destruction (0 = no bounce)
#   description  - human-readable label

standard_shell:
  type: standard_shell
  damage: 25
  speed: 420
  fire_rate: 1.0
  max_bounces: 0
  description: "Standard issue. No frills."

spread_shot:
  type: spread_shot
  damage: 15
  speed: 380
  fire_rate: 0.8
  max_bounces: 0
  spread_count: 3
  spread_angle: 18
  description: "Fires 3 shells in a spread. Lower per-shot damage."

bouncing_round:
  type: bouncing_round
  damage: 20
  speed: 400
  fire_rate: 0.9
  max_bounces: 3
  description: "Ricochets off walls up to 3 times."

homing_missile:
  type: homing_missile
  damage: 50
  speed: 240
  fire_rate: 0.4
  max_bounces: 0
  tracking_strength: 2.5
  description: "Slow but tracks the nearest enemy. High damage."
