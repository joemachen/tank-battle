# Ultimate abilities (v0.28 / v0.33.5)
#
# Layout:
#   Tank-type keys  (light_tank / medium_tank / heavy_tank / scout_tank)
#     — used as fallback when no ultimate_type kwarg is provided at match start.
#   Named ability keys  (overdrive / fortress / barrage / phantom / lockdown / disruptor)
#     — used by UltimateRoller and forwarded via ultimate_type kwarg.
#     — lockdown and disruptor are new in v0.33.5.
#
# Charge rate notes (v0.33.5):
#   passive_charge_rate  reduced to ~60% of original values
#   charge_per_damage    reduced to ~75% of original values
#   charge_per_hit       unchanged — getting hit still feels meaningful
#   Target: first ultimate at ~90–120s of active combat.
#
# Fields common to all entries:
#   charge_max          total charge required to activate
#   charge_per_damage   charge per 1 HP of damage dealt
#   charge_per_hit      charge per 1 HP of damage received
#   charge_passive_rate charge gained per second (passive)
#   ability_type        speed_burst | shield_dome | artillery_strike | cloak | lockdown | disruptor
#   duration            seconds active (0 = instant)
#   name                display name (used in HUD and LoadoutScene)
#   category            aggressor | mitigator | disrupter
#   color               flash / bar color [R, G, B]
#   sfx_key             key into ULTIMATE_SFX dict
#   collapses_fortress  whether this ability collapses active Fortress domes (bool)
#   breaks_phantom      whether this ability reveals active Phantom cloaks (bool)

# ---------------------------------------------------------------------------
# Tank-type keys (backward compat — game scene fallback when no override)
# ---------------------------------------------------------------------------

light_tank:
  name: "Overdrive"
  category: aggressor
  charge_max: 100.0
  charge_per_damage: 0.60
  charge_per_hit: 0.5
  charge_passive_rate: 1.2
  ability_type: speed_burst
  duration: 4.0
  speed_multiplier: 2.5
  fire_rate_multiplier: 2.0
  color: [255, 200, 60]
  description: "Overdrive — 2.5x speed, 2x fire rate for 4s"
  sfx_key: ult_speed_burst
  collapses_fortress: false
  breaks_phantom: false

