# data/configs/ai_difficulty.yaml
#
# AI difficulty tiers. Each tier sets the behavior parameters
# injected into AIController at instantiation.
#
# Fields:
#   reaction_time      - seconds before AI reacts to state changes (lower = sharper)
#   accuracy           - shot accuracy [0.0, 1.0] (higher = tighter aim)
#   aggression         - fire probability per frame when in attack range [0.0, 1.0]
#   evasion_threshold  - health_ratio below which AI enters EVADE state [0.0, 1.0]

easy:
  reaction_time: 0.80
  accuracy: 0.45
  aggression: 0.25
  evasion_threshold: 0.20
  low_hp_priority_weight: 0.0    # easy AI ignores HP — pure nearest targeting
  weapon_switch_interval: 6.0    # seconds between weapon evaluations
  elemental_awareness: 0.0       # easy AI ignores status effects entirely

medium:
  reaction_time: 0.40
  accuracy: 0.72
  aggression: 0.55
  evasion_threshold: 0.35
  low_hp_priority_weight: 0.5    # medium AI somewhat prefers wounded targets
  weapon_switch_interval: 3.0
  elemental_awareness: 0.5       # medium AI partially exploits combo opportunities

hard:
  reaction_time: 0.15
  accuracy: 0.92
  aggression: 0.85
  evasion_threshold: 0.55
  low_hp_priority_weight: 1.2    # hard AI aggressively hunts low-HP targets
  weapon_switch_interval: 1.5    # hard AI re-evaluates weapons more frequently
  elemental_awareness: 1.0       # hard AI always seeks best elemental combos
