# data/progression/xp_table.yaml
#
# XP thresholds and unlock rewards per level.
# To add a new level, append an entry — no code changes required.
#
# Fields:
#   xp_required   - cumulative XP needed to reach this level
#   unlocks       - list of tank/weapon IDs unlocked on reaching this level (empty list = none)

levels:
